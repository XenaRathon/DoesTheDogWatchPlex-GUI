name: build-and-push
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Forgejo registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ vars.REGISTRY_HOST }} -u ${{ github.repository_owner }} --password-stdin

      - name: Build & push GUI image
        run: |
          IMG=${{ vars.REGISTRY_HOST }}/${{ github.repository_owner }}/doesthedogwatchplex
          docker build -f Dockerfile.gui -t "$IMG:latest" -t "$IMG:${{ github.sha }}" .
          docker push "$IMG:latest"
          docker push "$IMG:${{ github.sha }}"
